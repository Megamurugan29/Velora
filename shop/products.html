<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - VelorabyMegha</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../styles/shop.css">
    <script src="../config.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo" aria-label="VelorabyMegha Home">
                <div class="logo-container">
                    <img src="../assets/images/logo/butterfly-logo.svg" alt="VelorabyMegha logo" class="brand-logo" data-logo-src="true" />
                </div>
                <span class="logo-text">VelorabyMegha</span>
            </a>
            <div class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="products.html" class="nav-link">Shop</a></li>
                <li><a href="cart.html" class="nav-link">Cart</a></li>
                <li><a href="../auth/signin.html" class="nav-link">Account</a></li>
                <li class="nav-divider"></li>
                <li><a href="cart.html" class="nav-link nav-cart">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-text">Cart</span>
                </a></li>
                <li><a href="#" class="nav-link nav-wishlist" id="mobileWishlist">
                    <span class="wishlist-icon">♡</span>
                    <span class="wishlist-text">Wishlist</span>
                </a></li>
                <li><button class="nav-link nav-profile-btn" id="mobileProfileBtn" aria-label="Account Menu">
                    <span class="profile-icon">👤</span>
                    <span class="profile-text">Account</span>
                </button></li>
            </ul>

            <!-- Right Side Icons -->
            <div class="nav-icons">
                <a href="#" class="nav-icon wishlist-icon-header" id="wishlistToggle" aria-label="Wishlist">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                    <span class="wishlist-badge" id="wishlistBadge">0</span>
                </a>

                <a href="cart.html" class="nav-icon cart-icon-header" aria-label="Shopping Cart">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                </a>

                <!-- Profile Dropdown -->
                <div class="nav-profile-dropdown">
                    <button class="nav-icon profile-icon-header" id="profileToggle" aria-label="Profile Menu" aria-expanded="false">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </button>
                    <div class="profile-dropdown-menu" id="profileDropdown">
                        <a href="../auth/signin.html" class="dropdown-item">
                            <span class="dropdown-icon">👤</span>
                            <span>Sign In</span>
                        </a>
                        <a href="../auth/signup.html" class="dropdown-item">
                            <span class="dropdown-icon">📝</span>
                            <span>Sign Up</span>
                        </a>
                        <div class="dropdown-divider"></div>
                        <a href="../auth/forgot-password.html" class="dropdown-item">
                            <span class="dropdown-icon">🔑</span>
                            <span>Forgot Password</span>
                        </a>
                    </div>
                </div>
            </div>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <h1>Luxury Collections</h1>
        <p>Discover Our Exquisite Handcrafted Kurtis</p>
    </div>

    <!-- Shop Container -->
    <div class="shop-container">
        <!-- Sidebar Filters -->
        <aside class="shop-sidebar">
            <div class="filter-section">
                <h3>Categories</h3>
                <div class="filter-options">
                    <label><input type="checkbox" name="category" value="royal"> Royal Collection</label>
                    <label><input type="checkbox" name="category" value="premium"> Premium Silk</label>
                    <label><input type="checkbox" name="category" value="festive"> Festive</label>
                    <label><input type="checkbox" name="category" value="casual"> Casual Wear</label>
                </div>
            </div>

            <div class="filter-section">
                <h3>Price Range</h3>
                <div class="price-range">
                    <input type="range" min="0" max="50000" id="priceRange">
                    <p>₹<span id="priceValue">50000</span></p>
                </div>
            </div>

            <div class="filter-section">
                <h3>Size</h3>
                <div class="filter-options">
                    <label><input type="checkbox" name="size" value="xs"> XS</label>
                    <label><input type="checkbox" name="size" value="s"> S</label>
                    <label><input type="checkbox" name="size" value="m"> M</label>
                    <label><input type="checkbox" name="size" value="l"> L</label>
                    <label><input type="checkbox" name="size" value="xl"> XL</label>
                    <label><input type="checkbox" name="size" value="xxl"> XXL</label>
                </div>
            </div>

            <div class="filter-section">
                <h3>Color</h3>
                <div class="color-options">
                    <span class="color-box" style="background: #0d4a3d;" data-color="emerald"></span>
                    <span class="color-box" style="background: #5a1628;" data-color="maroon"></span>
                    <span class="color-box" style="background: #f4e4c1;" data-color="champagne"></span>
                    <span class="color-box" style="background: #faf8f4;" data-color="ivory"></span>
                    <span class="color-box" style="background: #001f3f;" data-color="sapphire"></span>
                </div>
            </div>

            <div class="filter-section">
                <h3>Fabric</h3>
                <div class="filter-options">
                    <label><input type="checkbox" name="fabric" value="silk"> Pure Silk</label>
                    <label><input type="checkbox" name="fabric" value="cotton"> Cotton</label>
                    <label><input type="checkbox" name="fabric" value="blend"> Silk Blend</label>
                    <label><input type="checkbox" name="fabric" value="georgette"> Georgette</label>
                </div>
            </div>

            <button id="resetFilters" class="btn btn-outline">Reset Filters</button>
        </aside>

        <!-- Main Content -->
        <div class="shop-main">
            <!-- Sorting & View Options -->
            <div class="shop-controls">
                <div class="sort-control">
                    <label>Sort By:</label>
                    <select id="sortBy">
                        <option value="featured">Featured</option>
                        <option value="new">New Arrivals</option>
                        <option value="bestseller">Best Sellers</option>
                        <option value="low-high">Price: Low to High</option>
                        <option value="high-low">Price: High to Low</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>
                <div class="view-control">
                    <button class="view-btn grid-view active" title="Grid View">⊞</button>
                    <button class="view-btn list-view" title="List View">≡</button>
                </div>
            </div>

            <!-- Products Grid -->
            <div id="productsGrid" class="products-grid">
                <!-- Products will be loaded here -->
                <div class="loading-spinner">
                    <p>Loading products...</p>
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="pagination"></div>
        </div>
    </div>

    <script src="../script.js"></script>
    <script src="../js/logo-init.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/shop.js"></script>    <script src="../js/logo-init.js"></script></body>
</html>
