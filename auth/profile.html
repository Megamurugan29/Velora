<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - VelorabyMegha</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../styles/auth.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-icon">👑</span>
                <span class="logo-text">VelorabyMegha</span>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="../shop/products.html" class="nav-link">Shop</a></li>
                <li><a href="profile.html" class="nav-link">Profile</a></li>
            </ul>
        </div>
    </nav>

    <!-- Profile Container -->
    <div class="profile-container">
        <div class="profile-wrapper">
            <!-- Sidebar -->
            <div class="profile-sidebar">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <span id="avatarInitials">VM</span>
                    </div>
                    <h2 id="userName">User Name</h2>
                    <p id="userEmail">user@email.com</p>
                </div>

                <nav class="profile-menu">
                    <a href="#personal" class="profile-menu-item active" data-tab="personal">
                        <span class="menu-icon">👤</span> Personal Information
                    </a>
                    <a href="#addresses" class="profile-menu-item" data-tab="addresses">
                        <span class="menu-icon">📍</span> Addresses
                    </a>
                    <a href="#orders" class="profile-menu-item" data-tab="orders">
                        <span class="menu-icon">📦</span> My Orders
                    </a>
                    <a href="#wishlist" class="profile-menu-item" data-tab="wishlist">
                        <span class="menu-icon">❤️</span> Wishlist
                    </a>
                    <a href="#settings" class="profile-menu-item" data-tab="settings">
                        <span class="menu-icon">⚙️</span> Settings
                    </a>
                    <a href="#" id="logoutBtn" class="profile-menu-item logout">
                        <span class="menu-icon">🚪</span> Logout
                    </a>
                </nav>
            </div>

            <!-- Content -->
            <div class="profile-content">
                <!-- Personal Information Tab -->
                <div id="personal" class="profile-tab active">
                    <h3>Personal Information</h3>
                    <form id="personalForm" class="profile-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>First Name</label>
                                <input type="text" id="profileFirstName" required>
                            </div>
                            <div class="form-group">
                                <label>Last Name</label>
                                <input type="text" id="profileLastName" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profileEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" id="profilePhone" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </form>
                </div>

                <!-- Addresses Tab -->
                <div id="addresses" class="profile-tab">
                    <h3>Saved Addresses</h3>
                    <div id="addressesList" class="addresses-list"></div>
                    <button id="addAddressBtn" class="btn btn-primary">Add New Address</button>
                </div>

                <!-- Orders Tab -->
                <div id="orders" class="profile-tab">
                    <h3>My Orders</h3>
                    <div id="ordersList" class="orders-list"></div>
                </div>

                <!-- Wishlist Tab -->
                <div id="wishlist" class="profile-tab">
                    <h3>My Wishlist</h3>
                    <div id="wishlistItems" class="wishlist-grid"></div>
                </div>

                <!-- Settings Tab -->
                <div id="settings" class="profile-tab">
                    <h3>Account Settings</h3>
                    <div class="settings-section">
                        <h4>Change Password</h4>
                        <form id="changePasswordForm" class="profile-form">
                            <div class="form-group">
                                <label>Current Password</label>
                                <input type="password" id="currentPassword" required>
                            </div>
                            <div class="form-group">
                                <label>New Password</label>
                                <input type="password" id="newPassword" required>
                            </div>
                            <div class="form-group">
                                <label>Confirm Password</label>
                                <input type="password" id="confirmNewPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Update Password</button>
                        </form>
                    </div>
                    <div class="settings-section">
                        <h4>Notifications</h4>
                        <div class="checkbox-group">
                            <label>
                                <input type="checkbox" checked>
                                Email notifications for new collections
                            </label>
                            <label>
                                <input type="checkbox" checked>
                                Order status updates
                            </label>
                            <label>
                                <input type="checkbox">
                                Promotional offers
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
