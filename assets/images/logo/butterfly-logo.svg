<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="butterfly-gradient-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a87c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4956f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="butterfly-gradient-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4e4c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a87c;stop-opacity:1" />
    </linearGradient>
    <filter id="luxury-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Body -->
  <ellipse cx="50" cy="50" rx="8" ry="18" fill="url(#butterfly-gradient-1)" filter="url(#luxury-glow)"/>
  
  <!-- Upper Left Wing -->
  <path d="M 50 45 Q 30 25, 25 35 Q 20 45, 35 55 Q 45 50, 50 45 Z" fill="url(#butterfly-gradient-2)" stroke="#e8a87c" stroke-width="0.5" filter="url(#luxury-glow)"/>
  
  <!-- Upper Right Wing -->
  <path d="M 50 45 Q 70 25, 75 35 Q 80 45, 65 55 Q 55 50, 50 45 Z" fill="url(#butterfly-gradient-2)" stroke="#e8a87c" stroke-width="0.5" filter="url(#luxury-glow)"/>
  
  <!-- Lower Left Wing -->
  <path d="M 50 55 Q 35 70, 28 68 Q 18 66, 22 52 Q 35 60, 50 55 Z" fill="url(#butterfly-gradient-1)" stroke="#d4956f" stroke-width="0.5" filter="url(#luxury-glow)"/>
  
  <!-- Lower Right Wing -->
  <path d="M 50 55 Q 65 70, 72 68 Q 82 66, 78 52 Q 65 60, 50 55 Z" fill="url(#butterfly-gradient-1)" stroke="#d4956f" stroke-width="0.5" filter="url(#luxury-glow)"/>
  
  <!-- Wing Patterns - Upper Left -->
  <circle cx="37" cy="42" r="2.5" fill="#4a1a4a" opacity="0.6"/>
  <circle cx="28" cy="50" r="2" fill="#001f3f" opacity="0.5"/>
  
  <!-- Wing Patterns - Upper Right -->
  <circle cx="63" cy="42" r="2.5" fill="#4a1a4a" opacity="0.6"/>
  <circle cx="72" cy="50" r="2" fill="#001f3f" opacity="0.5"/>
  
  <!-- Wing Patterns - Lower Left -->
  <circle cx="32" cy="62" r="2" fill="#001f3f" opacity="0.5"/>
  
  <!-- Wing Patterns - Lower Right -->
  <circle cx="68" cy="62" r="2" fill="#001f3f" opacity="0.5"/>
  
  <!-- Head -->
  <circle cx="50" cy="42" r="3.5" fill="url(#butterfly-gradient-1)" filter="url(#luxury-glow)"/>
  
  <!-- Antennae -->
  <path d="M 48 40 Q 45 35, 43 28" stroke="#d4956f" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M 52 40 Q 55 35, 57 28" stroke="#d4956f" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  
  <!-- Antenna Tips -->
  <circle cx="43" cy="27" r="1.2" fill="#e8a87c"/>
  <circle cx="57" cy="27" r="1.2" fill="#e8a87c"/>
</svg>