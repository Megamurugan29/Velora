<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - VelorabyMegha</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../admin/admin.css">
    <script src="../config.js"></script>
</head>
<body class="admin-login-page">
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="admin-logo">
                <img src="../assets/images/logo/butterfly-logo.svg" alt="VelorabyMegha logo" class="brand-logo" data-logo-src="true" />
                <h1>VelorabyMegha Admin</h1>
            </div>
            
            <h2>Administrative Access</h2>
            <p>Enter your credentials to access the admin dashboard</p>

            <form id="adminLoginForm" class="admin-form">
                <div class="form-group">
                    <label for="adminEmail">Email Address</label>
                    <input type="email" id="adminEmail" name="adminEmail" placeholder="VelorabyMegha@gmail.com" required>
                </div>

                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" name="adminPassword" placeholder="Enter your password" required>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="rememberAdmin" name="rememberAdmin">
                    <label for="rememberAdmin">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary admin-login-btn">Sign In to Admin</button>
            </form>

            <div class="admin-info">
                <p><strong>Admin Credentials:</strong></p>
                <p>Email: VelorabyMegha@gmail.com</p>
                <p>Password: Admin@123</p>
            </div>

            <div class="admin-footer">
                <a href="../index.html">← Back to Store</a>
            </div>
        </div>
    </div>

    <script src="../admin/admin.js"></script>
    <script src="../js/logo-init.js"></script>
</body>
</html>
